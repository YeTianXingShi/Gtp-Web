<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="chat-page">
    <header class="topbar">
      <div>当前用户：<strong>{{ username }}</strong></div>
      <div class="toolbar">
        <label for="model-select">模型：</label>
        <select id="model-select">
          {% for group in model_groups %}
          <optgroup label="{{ group.label }}">
            {% for model in group.options %}
            <option value="{{ model.id }}">{{ model.label }}</option>
            {% endfor %}
          </optgroup>
          {% endfor %}
        </select>
        <div id="model-setting-field" class="toolbar-setting" hidden>
          <label id="model-setting-label" for="model-setting-select">Effort：</label>
          <select id="model-setting-select"></select>
        </div>
        {% if is_admin %}
        <button id="admin-btn" class="btn-secondary" type="button">后台管理</button>
        {% endif %}
        <button id="logout-btn" type="button">退出</button>
      </div>
    </header>

    <main class="chat-shell">
      <aside class="sidebar">
        <input id="search-input" type="search" placeholder="搜索会话标题或内容..." />
        <div class="side-actions">
          <button id="new-conv-btn" type="button">+ 新对话</button>
          <button id="rename-conv-btn" class="btn-secondary" type="button">重命名</button>
          <div class="side-action-stack">
            <button
              id="export-conv-btn"
              class="btn-secondary"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="export-menu"
            >
              导出
            </button>
            <div id="export-menu" class="action-menu" aria-hidden="true">
              <button class="action-menu-item" type="button" data-export-format="json">导出为 JSON</button>
              <button class="action-menu-item" type="button" data-export-format="txt">导出为 TXT</button>
              <button class="action-menu-item" type="button" data-export-format="md">导出为 Markdown</button>
            </div>
          </div>
          <div class="side-action-stack">
            <button
              id="delete-conv-btn"
              class="btn-danger"
              type="button"
              aria-haspopup="dialog"
              aria-expanded="false"
              aria-controls="delete-confirm-panel"
            >
              删除
            </button>
            <div id="delete-confirm-panel" class="confirm-panel" aria-hidden="true">
              <div class="confirm-panel-title">确认删除当前会话？</div>
              <div class="confirm-panel-desc">删除后不可恢复，按 Enter 可直接确认。</div>
              <div class="confirm-panel-actions">
                <button id="confirm-delete-btn" class="btn-danger" type="button">确认删除</button>
                <button id="cancel-delete-btn" class="btn-secondary" type="button">取消</button>
              </div>
            </div>
          </div>
        </div>
        <div id="conversation-list" class="conversation-list"></div>
      </aside>

      <section class="chat-layout">
        <section id="messages" class="messages"></section>
        <form id="chat-form" class="input-row">
          <div class="input-tools">
            <label for="file-input" class="file-picker">+ 添加文件</label>
            <input id="file-input" type="file" multiple />
            <div id="selected-files" class="selected-files"></div>
          </div>
          <div class="prompt-field">
            <textarea id="prompt" rows="3" placeholder="输入你的问题（可选，可仅发送附件）..."></textarea>
            <div class="input-shortcut-hint">Enter 发送，Shift + Enter 换行</div>
          </div>
          <button id="send-btn" type="submit">发送</button>
        </form>
      </section>
    </main>

    <script>
      window.__APP_CONFIG__ = {
        username: "{{ username }}",
        isAdmin: {{ is_admin | tojson }},
        modelOptions: {{ model_options | tojson }},
        maxAttachmentsPerMessage: {{ max_attachments_per_message }},
        maxUploadMB: {{ max_upload_mb }},
        allowedAttachmentExts: {{ allowed_attachment_exts | tojson }},
      };
    </script>
    <script src="{{ url_for('static', filename='chat.js') }}"></script>
  </body>
</html>
