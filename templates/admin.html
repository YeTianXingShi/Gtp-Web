<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台管理 - AI Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="admin-page">
    <header class="topbar">
      <div>当前管理员：<strong>{{ username }}</strong></div>
      <div class="toolbar">
        <button id="chat-btn" class="btn-secondary" type="button">进入聊天</button>
        <button id="logout-btn" type="button">退出</button>
      </div>
    </header>

    <main class="admin-shell">
      <section class="admin-panel">
        <div class="panel-header">
          <div>
            <h1>配置文件管理</h1>
            <p class="panel-hint">直接编辑白名单配置文件。环境变量统一使用 `config/env/*.env` 分组维护；保存后会自动热更新支持的运行项，其余改动按提示决定是否重启服务。</p>
          </div>
          <button id="reload-config-btn" class="btn-secondary" type="button">重新加载</button>
        </div>

        <div class="config-toolbar">
          <label class="config-file-field">
            <span>配置文件</span>
            <select id="config-file-select"></select>
          </label>
          <div id="config-restart-hint" class="config-restart-hint"></div>
        </div>
        <div id="config-description" class="panel-hint"></div>
        <div class="config-meta">文件路径：<code id="config-path"></code></div>
        <p id="config-error" class="error"></p>
        <p id="config-save-result" class="config-save-result"></p>
        <textarea id="config-editor" class="config-editor" spellcheck="false"></textarea>
        <div class="panel-actions">
          <button id="save-config-btn" type="button">保存当前文件</button>
        </div>
      </section>
    </main>

    <script>
      window.__ADMIN_CONFIG__ = {
        username: {{ username | tojson }},
        configFiles: {{ config_files | tojson }},
      };
    </script>
    <script src="{{ url_for('static', filename='admin.js') }}"></script>
  </body>
</html>
